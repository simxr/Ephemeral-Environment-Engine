apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: eee-preview-environments
  namespace: argocd
spec:
  description: Ephemeral preview environments managed by EEE.
  sourceRepos:
    - https://github.com/simxr/Ephemeral-Environment-Engine.git
  destinations:
    - namespace: env-pr-*
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
