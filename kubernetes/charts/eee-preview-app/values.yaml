replicaCount: 1

prNumber: "42"
environmentName: env-pr-42

image:
  repository: hashicorp/http-echo
  pullPolicy: IfNotPresent
  tag: "1.0.0"

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: traefik
  annotations: {}
  tls: []

aws:
  region: us-east-1
  endpointUrl: http://eee-localstack.default.svc.cluster.local:4566
  s3Bucket: env-pr-42-local-app-data
  dynamoTable: env-pr-42-local-app-state
  sqsQueueUrl: http://eee-localstack.default.svc.cluster.local:4566/000000000000/env-pr-42-local-events
  accessKeyId: test
  secretAccessKey: test

seeder:
  enabled: true
  image:
    repository: public.ecr.aws/aws-cli/aws-cli
    tag: "2.15.40"
    pullPolicy: IfNotPresent
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  activeDeadlineSeconds: 180
  dataset:
    products:
      - id: demo-widget
        name: Demo Widget
        price: "19.99"
      - id: preview-plan
        name: Preview Plan
        price: "0.00"

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
