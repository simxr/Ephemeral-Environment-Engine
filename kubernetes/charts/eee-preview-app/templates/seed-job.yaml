{{- if .Values.seeder.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "eee-preview-app.fullname" . }}-seed
  labels:
    {{- include "eee-preview-app.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.seeder.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.seeder.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.seeder.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "eee-preview-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: seeder
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "eee-preview-app.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: seed
          image: "{{ .Values.seeder.image.repository }}:{{ .Values.seeder.image.tag }}"
          imagePullPolicy: {{ .Values.seeder.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}"
              export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}"
              export AWS_DEFAULT_REGION="${AWS_REGION}"

              aws --endpoint-url "${AWS_ENDPOINT_URL}" s3api head-bucket --bucket "${AWS_S3_BUCKET}" >/dev/null 2>&1 \
                || aws --endpoint-url "${AWS_ENDPOINT_URL}" s3 mb "s3://${AWS_S3_BUCKET}"

              aws --endpoint-url "${AWS_ENDPOINT_URL}" s3 cp /seed/products.json "s3://${AWS_S3_BUCKET}/seed/products.json"

              aws --endpoint-url "${AWS_ENDPOINT_URL}" dynamodb describe-table --table-name "${AWS_DYNAMODB_TABLE}" >/dev/null 2>&1 \
                || aws --endpoint-url "${AWS_ENDPOINT_URL}" dynamodb create-table \
                  --table-name "${AWS_DYNAMODB_TABLE}" \
                  --billing-mode PAY_PER_REQUEST \
                  --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S \
                  --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE

              aws --endpoint-url "${AWS_ENDPOINT_URL}" dynamodb wait table-exists --table-name "${AWS_DYNAMODB_TABLE}"
              aws --endpoint-url "${AWS_ENDPOINT_URL}" dynamodb batch-write-item --request-items file:///seed/dynamodb-batch.json
          envFrom:
            - configMapRef:
                name: {{ include "eee-preview-app.fullname" . }}-config
          env:
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.aws.accessKeyId | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.aws.secretAccessKey | quote }}
          volumeMounts:
            - name: seed-data
              mountPath: /seed
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
      volumes:
        - name: seed-data
          configMap:
            name: {{ include "eee-preview-app.fullname" . }}-seed
{{- end }}
